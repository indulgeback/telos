version: '3.8'

services:
  # 数据库服务
  postgres:
    image: postgres:15-alpine
    container_name: telos-postgres
    environment:
      POSTGRES_DB: telos
      POSTGRES_USER: telos
      POSTGRES_PASSWORD: telos123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - telos-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U telos']
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: telos-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - telos-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3

  # 服务注册中心
  registry:
    build:
      context: .
      dockerfile: apps/registry/Dockerfile
    container_name: telos-registry
    ports:
      - '8090:8090'
    environment:
      - PORT=8090
      - NODE_ENV=production
    networks:
      - telos-network
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:8090/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # API 网关
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: telos-api-gateway
    ports:
      - '8890:8890'
    environment:
      - PORT=8890
      - REGISTRY_URL=http://registry:8090
      - GATEWAY_PORT=8890
      - REGISTRY_SERVICE_URL=http://registry:8090
      - NODE_ENV=production
      - BETTER_AUTH_BASE_URL=${BETTER_AUTH_BASE_URL:-http://host.docker.internal:8800}
      - BETTER_AUTH_SESSION_PATH=${BETTER_AUTH_SESSION_PATH:-/api/auth/get-session}
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET:-dev-gateway-internal-secret-change-me}
      - AUTH_CACHE_TTL_SECONDS=${AUTH_CACHE_TTL_SECONDS:-60}
      - AUTH_CLOCK_SKEW_SECONDS=${AUTH_CLOCK_SKEW_SECONDS:-300}
    depends_on:
      registry:
        condition: service_healthy
    networks:
      - telos-network
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:8890/ping',
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Agent 服务 (TypeScript/LangChain)
  agent-service:
    build:
      context: .
      dockerfile: services/agent-service/Dockerfile
    container_name: telos-agent-service
    ports:
      - '8895:8895'
    environment:
      - NODE_ENV=production
      - PORT=8895
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - SEED_API_KEY=${SEED_API_KEY:-}
      - SEED_BASE_URL=${SEED_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      - BAILIAN_API_KEY=${BAILIAN_API_KEY:-}
      - BAILIAN_BASE_URL=${BAILIAN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - SHORTAPI_API_KEY=${SHORTAPI_API_KEY:-}
      - SHORTAPI_BASE_URL=${SHORTAPI_BASE_URL:-https://api.shortapi.ai/v1}
      - DEFAULT_AGENT_MODEL=${DEFAULT_AGENT_MODEL:-deepseek-v4-flash}
      - DATABASE_URL=${DATABASE_URL:-postgresql://telos:telos123@postgres:5432/telos?schema=public}
      - REGISTRY_URL=http://registry:8090
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET:-dev-gateway-internal-secret-change-me}
      - AUTH_CLOCK_SKEW_SECONDS=${AUTH_CLOCK_SKEW_SECONDS:-300}
      - ALLOW_ANONYMOUS_OWNER=${ALLOW_ANONYMOUS_OWNER:-false}
    depends_on:
      registry:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - telos-network
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:8895/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web 前端应用
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: telos-web
    ports:
      - '8800:8800'
    environment:
      - PORT=8800
      - NEXT_PUBLIC_API_URL=http://localhost:8890
      - NODE_ENV=production
      # 注意：生产环境中应该使用环境变量或密钥管理
      - AUTH_SECRET=your-auth-secret-here
      - GITHUB_CLIENT_ID=your-github-client-id
      - GITHUB_CLIENT_SECRET=your-github-client-secret
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - telos-network
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:8800',
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # 移动应用 Metro 服务器（开发用）
  mobile-metro:
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile
      target: metro
    container_name: telos-mobile-metro
    ports:
      - '8081:8081'
    environment:
      - NODE_ENV=development
    networks:
      - telos-network
    profiles:
      - development

networks:
  telos-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
